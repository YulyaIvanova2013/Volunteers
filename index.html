<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteering Tasks</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --green: #22c55e;
      --dark-green: #064e3b;
      --mint: #d1fae5;
      --soft: #ecfdf5;
      --white: #ffffff;
      --shadow: rgba(6, 78, 59, 0.18);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.28), transparent 30%),
        radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.22), transparent 35%),
        linear-gradient(135deg, #ecfdf5, #f0fdfa 50%, #ffffff);
      color: var(--dark-green);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 28px 28px 42px;
    }

    .hero {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 30px;
      padding: 26px 24px;
      margin-bottom: 22px;
      box-shadow: 0 18px 40px var(--shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.16);
      top: -110px;
      right: -70px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1;
      letter-spacing: 1px;
      color: #065f46;
      position: relative;
    }

    .hero p {
      margin: 12px 0 0;
      font-size: 17px;
      color: #047857;
      font-weight: 600;
      position: relative;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .btn {
      border: none;
      min-height: 86px;
      padding: 18px 20px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      color: #065f46;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(6, 78, 59, 0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: auto 18px 12px 18px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #22c55e, #14b8a6);
      opacity: 0;
      transform: scaleX(0.4);
      transition: 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 32px rgba(6, 78, 59, 0.18);
      background: #ffffff;
    }

    .btn.active {
      background: linear-gradient(135deg, #22c55e, #14b8a6);
      color: #ffffff;
      box-shadow: 0 18px 34px rgba(20, 184, 166, 0.32);
      transform: translateY(-3px);
    }

    .btn.active::after {
      opacity: 1;
      background: rgba(255, 255, 255, 0.92);
      transform: scaleX(1);
    }

    .panel {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 32px;
      padding: 18px;
      min-height: 635px;
      box-shadow: 0 20px 45px rgba(6, 78, 59, 0.16);
    }

    .viewer {
      border-radius: 24px;
      min-height: 590px;
      background:
        linear-gradient(135deg, rgba(209, 250, 229, 0.7), rgba(240, 253, 250, 0.9));
      padding: 14px;
      overflow: hidden;
    }

    .task-frame {
      width: 100%;
      height: 580px;
      border: none;
      border-radius: 18px;
      background: #ffffff;
      display: none;
      opacity: 0;
      transform: translateY(14px) scale(0.985);
      transition: opacity 0.45s ease, transform 0.45s ease;
      box-shadow: 0 14px 30px rgba(6, 78, 59, 0.12);
    }

    .task-frame.show {
      display: block;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .placeholder {
      height: 580px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, #ffffff, #ecfdf5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
      box-shadow: inset 0 0 0 2px rgba(34, 197, 94, 0.12);
      animation: fadeIn 0.6s ease both;
    }


    .cover-image {
      width: min(760px, 100%);
      max-height: 430px;
      object-fit: contain;
      display: block;
      margin: 0 auto 18px;
      border-radius: 22px;
      box-shadow: 0 16px 34px rgba(6, 78, 59, 0.16);
    }

    .placeholder-card {
      max-width: 620px;
      padding: 32px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 36px rgba(6, 78, 59, 0.14);
    }

    .placeholder-icon {
      font-size: 64px;
      margin-bottom: 12px;
    }

    .placeholder-title {
      font-size: 30px;
      font-weight: 900;
      color: #065f46;
      margin-bottom: 8px;
    }

    .placeholder-text {
      font-size: 17px;
      color: #047857;
      font-weight: 600;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 850px) {
      .page {
        padding: 18px 14px 28px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .btn {
        min-height: 68px;
      }

      .panel,
      .viewer {
        border-radius: 24px;
      }

      .task-frame,
      .placeholder {
        height: 500px;
      }
    }

    @media (max-width: 520px) {
      .hero {
        border-radius: 22px;
      }

      .task-frame,
      .placeholder {
        height: 430px;
      }

      .placeholder-title {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="hero">
      <h1>Volunteering</h1>
      <p>Choose a task and start practising</p>
    </header>

    <div class="buttons">
      <button class="btn" data-file="tasks/text.html">
        Text True / False / Not Stated Scouts
      </button>

      <button class="btn" data-file="tasks/grammar.html">
        Grammar
      </button>

      <button class="btn" data-file="tasks/word_formation.html">
        Word Formation
      </button>
    </div>

    <main class="panel">
      <div class="viewer">
        <div class="placeholder" id="placeholder">
          <div class="placeholder-card">
            <img class="cover-image" src="image/1.png" alt="Exam Pack Volunteering" />
            <div class="placeholder-title"></div>
            <div class="placeholder-text"></div>
          </div>
        </div>

        <iframe
          id="taskFrame"
          class="task-frame"
          src=""
          title="Task Viewer">
        </iframe>
      </div>
    </main>
  </div>

  <script>
    const buttons = document.querySelectorAll('.btn');
    const frame = document.getElementById('taskFrame');
    const placeholder = document.getElementById('placeholder');

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        buttons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');

        const file = button.getAttribute('data-file');

        frame.classList.remove('show');

        setTimeout(() => {
          placeholder.style.display = 'none';
          frame.src = file;
          frame.style.display = 'block';

          requestAnimationFrame(() => {
            frame.classList.add('show');
          });
        }, 180);
      });
    });
  </script>
</body>
</html>
